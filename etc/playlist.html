        // 플레이어 재생 함수
        function playStream(url, name) {
            status.innerText = "현재 재생 중: " + name;
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
            window.scrollTo(0, 0);
        }

        // KBS 주소 추출 및 재생
        async function loadKBS(chCode, name, btn) {
            setActive(btn);
            const apiUrl = `https://cfpwwwapi.kbs.co.kr/api/v1/landing/live/channel_code/${chCode}`;
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const streamUrl = data.channel_item[0].service_url;
                playStream(streamUrl, name);
            } catch (e) {
                alert("KBS 주소를 가져오지 못했습니다.");
            }
        }

        function setActive(target) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            target.classList.add('active');
        }

        });
